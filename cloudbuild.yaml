# Cloud Build pipeline for the HRM system.
#
# Trigger this on pushes to `main`, or run manually:
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions=_REDIS_IP=10.x.x.x,_WEB_URL=https://hrm.example.com
#
# Required one-time setup (see docs/deployment-gcp.md):
#   - Cloud SQL instance, Memorystore Redis + Serverless VPC connector
#   - Secret Manager secrets: JWT_SECRET, DATABASE_URL, RESEND_API_KEY,
#     ANTHROPIC_API_KEY, GOOGLE_CLIENT_SECRET
#   - GCS bucket for CVs, IAM bindings for the runtime service account
#   - The Cloud Build service account needs: Cloud Run Admin, Service Account User,
#     Artifact Registry Writer, Cloud SQL Client, Secret Manager Secret Accessor,
#     Firebase Hosting Admin.

substitutions:
  _REGION: asia-southeast1
  _REPO: hrm
  _SQL_INSTANCE: hrm-pg # short name; expands to PROJECT:REGION:hrm-pg below
  _VPC_CONNECTOR: hrm-vpc
  _GCS_BUCKET: '' # e.g. hrm-cv-hrm-prod
  _REDIS_IP: '' # Memorystore private IP, e.g. 10.0.0.3
  _WEB_URL: '' # e.g. https://hrm.codecrush.asia (for CORS + APP_WEB_URL + Google redirects)

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/api:$SHORT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/api:latest'

steps:
  # 1) Build the API/worker image (build context = repo root).
  - id: build-api
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - apps/api/Dockerfile
      - -t
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/api:$SHORT_SHA'
      - -t
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/api:latest'
      - .

  - id: push-api
    name: gcr.io/cloud-builders/docker
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/api']
    waitFor: ['build-api']

  # 2) Run database migrations as a Cloud Run job (create-or-update + run now).
  - id: migrate
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - jobs
      - deploy
      - hrm-migrate
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/api:$SHORT_SHA
      - --region=${_REGION}
      - --set-cloudsql-instances=$PROJECT_ID:${_REGION}:${_SQL_INSTANCE}
      - --vpc-connector=${_VPC_CONNECTOR}
      - --set-secrets=DATABASE_URL=DATABASE_URL:latest
      - --command=pnpm
      - --args=--filter,@hrm/api,exec,prisma,migrate,deploy
      - --execute-now
      - --wait
    waitFor: ['push-api']

  # 3) Deploy the HTTP API service.
  - id: deploy-api
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - hrm-api
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/api:$SHORT_SHA
      - --region=${_REGION}
      - --allow-unauthenticated
      - --add-cloudsql-instances=$PROJECT_ID:${_REGION}:${_SQL_INSTANCE}
      - --vpc-connector=${_VPC_CONNECTOR}
      - --set-env-vars=NODE_ENV=production,TRUST_PROXY=1,STORAGE_DRIVER=gcs,GCS_BUCKET=${_GCS_BUCKET},REDIS_URL=redis://${_REDIS_IP}:6379,CORS_ORIGIN=${_WEB_URL},APP_WEB_URL=${_WEB_URL},GOOGLE_REDIRECT_URI=${_WEB_URL}/api/v1/auth/google/callback,GOOGLE_SUCCESS_REDIRECT=${_WEB_URL}/auth/google/success,GOOGLE_FAILURE_REDIRECT=${_WEB_URL}/login,JWT_ACCESS_EXPIRES_IN=15m,JWT_REFRESH_EXPIRES_IN=7d,RATE_LIMIT_DISABLED=false
      - --set-secrets=JWT_SECRET=JWT_SECRET:latest,DATABASE_URL=DATABASE_URL:latest,RESEND_API_KEY=RESEND_API_KEY:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest,GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest
    waitFor: ['migrate']

  # 4) Deploy the worker service (same image, worker entrypoint, always-on).
  - id: deploy-worker
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - hrm-worker
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/api:$SHORT_SHA
      - --region=${_REGION}
      - --no-allow-unauthenticated
      - --min-instances=1
      - --no-cpu-throttling
      - --add-cloudsql-instances=$PROJECT_ID:${_REGION}:${_SQL_INSTANCE}
      - --vpc-connector=${_VPC_CONNECTOR}
      - --command=node
      - --args=apps/api/dist/worker.js
      - --set-env-vars=NODE_ENV=production,STORAGE_DRIVER=gcs,GCS_BUCKET=${_GCS_BUCKET},REDIS_URL=redis://${_REDIS_IP}:6379,APP_WEB_URL=${_WEB_URL}
      - --set-secrets=DATABASE_URL=DATABASE_URL:latest,RESEND_API_KEY=RESEND_API_KEY:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest
    waitFor: ['migrate']

  # 5) Build the web SPA. VITE_API_URL=/api/v1 → calls go same-origin through the
  #    Firebase Hosting rewrite to hrm-api (no CORS, no exposed API host).
  - id: build-web
    name: node:20-slim
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        corepack enable && corepack prepare pnpm@9.1.0 --activate
        pnpm install --frozen-lockfile
        pnpm --filter @hrm/shared build
        VITE_API_URL=/api/v1 pnpm --filter @hrm/web build
    waitFor: ['-'] # start immediately, in parallel with the image build

  # 6) Deploy the SPA to Firebase Hosting (uses the build SA's ADC).
  - id: deploy-web
    name: node:20-slim
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        npx -y firebase-tools@13 deploy --only hosting --project $PROJECT_ID --non-interactive
    waitFor: ['build-web', 'deploy-api']

timeout: 1800s
