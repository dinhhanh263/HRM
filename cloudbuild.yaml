# Cloud Build pipeline for the HRM system.
#
# Two-phase deploy (see docs/deployment-gcp.md):
#   First deploy (creates the hrm-api service):
#     gcloud builds submit --config cloudbuild.yaml \
#       --substitutions=_GCS_BUCKET=hrm-cv-$PROJECT_ID,_WEB_URL=https://hrm.codecrush.asia
#   Then capture the service URL and re-run with it so Cloud Tasks can reach the
#   internal task routes:
#     API_URL=$(gcloud run services describe hrm-api --region=asia-southeast1 --format='value(status.url)')
#     gcloud builds submit --config cloudbuild.yaml \
#       --substitutions=_GCS_BUCKET=hrm-cv-$PROJECT_ID,_WEB_URL=https://hrm.codecrush.asia,_API_URL=$API_URL
#
# Required one-time setup (see docs/deployment-gcp.md):
#   - Cloud SQL instance (no Memorystore / VPC connector needed anymore)
#   - Cloud Tasks queues (hrm-cv-parse, hrm-employee-import, hrm-employee-invite,
#     hrm-reminder-email, hrm-reminder-scan) + a Cloud Scheduler job for reminder-scan
#   - Secret Manager secrets: JWT_SECRET, DATABASE_URL, RESEND_API_KEY,
#     ANTHROPIC_API_KEY, GOOGLE_CLIENT_SECRET, GOOGLE_CLIENT_ID, TASKS_SECRET
#   - GCS bucket for CVs, IAM bindings for the runtime service account
#   - The Cloud Build service account needs: Cloud Run Admin, Service Account User,
#     Artifact Registry Writer, Cloud SQL Client, Secret Manager Secret Accessor,
#     Firebase Hosting Admin.

substitutions:
  _REGION: asia-southeast1
  _REPO: hrm
  _SQL_INSTANCE: hrm-pg # short name; expands to PROJECT:REGION:hrm-pg below
  _GCS_BUCKET: '' # e.g. hrm-cv-gen-lang-client-0828439003
  _WEB_URL: '' # e.g. https://hrm.codecrush.asia (for CORS + APP_WEB_URL + Google redirects)
  _API_URL: '' # hrm-api Cloud Run URL; set on the 2nd deploy so Cloud Tasks can reach /internal/tasks/*

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

# Image is always tagged :latest. Each deploy resolves it to the new digest and
# creates a fresh Cloud Run revision, so rollback (via revisions) still works.
images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/api:latest'

steps:
  # 1) Build the API image (build context = repo root).
  - id: build-api
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - apps/api/Dockerfile
      - -t
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/api:latest'
      - .

  - id: push-api
    name: gcr.io/cloud-builders/docker
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/api']
    waitFor: ['build-api']

  # 2) Run database migrations as a Cloud Run job (create-or-update + run now).
  #    Cloud SQL is reached via the unix socket (--set-cloudsql-instances) — no VPC.
  - id: migrate
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - jobs
      - deploy
      - hrm-migrate
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/api:latest
      - --region=${_REGION}
      - --set-cloudsql-instances=$PROJECT_ID:${_REGION}:${_SQL_INSTANCE}
      - --set-secrets=DATABASE_URL=DATABASE_URL:latest
      - --command=pnpm
      - --args=--filter,@hrm/api,exec,prisma,migrate,deploy
      - --execute-now
      - --wait
    waitFor: ['push-api']

  # 2b) Sync the RBAC catalog + system-role grants + default approval flows
  #     (LEAVE/PAYMENT/PURCHASE) to match the code catalog. Idempotent — safe on
  #     every deploy, and required whenever a new permission is added (otherwise
  #     non-SUPER_ADMIN roles 403 on the new feature). Runs the COMPILED entry via
  #     plain `node` (the image ships dist, not src). deploy-api waits on this, so
  #     a failed sync fails the deploy closed (old revision keeps serving).
  - id: seed-rbac
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - jobs
      - deploy
      - hrm-rbac-seed
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/api:latest
      - --region=${_REGION}
      - --set-cloudsql-instances=$PROJECT_ID:${_REGION}:${_SQL_INSTANCE}
      - --set-secrets=DATABASE_URL=DATABASE_URL:latest
      - --command=node
      - --args=apps/api/dist/scripts/seed-rbac.js
      - --execute-now
      - --wait
    waitFor: ['migrate']

  # 3) Deploy the HTTP API service. It serves the public API AND executes jobs via
  #    /internal/tasks/* (Cloud Tasks pushes to it). Scale-to-zero; no worker, no Redis.
  #    --timeout=900 gives long CV-parse jobs (Anthropic) headroom.
  - id: deploy-api
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - hrm-api
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/api:latest
      - --region=${_REGION}
      - --allow-unauthenticated
      - --timeout=900
      - --add-cloudsql-instances=$PROJECT_ID:${_REGION}:${_SQL_INSTANCE}
      - --set-env-vars=NODE_ENV=production,TRUST_PROXY=1,STORAGE_DRIVER=gcs,GCS_BUCKET=${_GCS_BUCKET},CORS_ORIGIN=${_WEB_URL},APP_WEB_URL=${_WEB_URL},GOOGLE_REDIRECT_URI=${_WEB_URL}/api/v1/auth/google/callback,GOOGLE_SUCCESS_REDIRECT=${_WEB_URL}/auth/google/success,GOOGLE_FAILURE_REDIRECT=${_WEB_URL}/login,JWT_ACCESS_EXPIRES_IN=15m,JWT_REFRESH_EXPIRES_IN=7d,RATE_LIMIT_DISABLED=false,TASKS_DRIVER=cloud,TASKS_PROJECT=$PROJECT_ID,TASKS_LOCATION=${_REGION},APP_INTERNAL_URL=${_API_URL}
      # Google SSO (GOOGLE_CLIENT_ID/SECRET) is omitted — the app reads it via
      # process.env with '' defaults and degrades gracefully. To enable: create
      # the secret and append it here.
      - --set-secrets=JWT_SECRET=JWT_SECRET:latest,DATABASE_URL=DATABASE_URL:latest,TASKS_SECRET=TASKS_SECRET:latest,RESEND_API_KEY=RESEND_API_KEY:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest
    waitFor: ['migrate', 'seed-rbac']

  # 4) Build the web SPA. VITE_API_URL=/api/v1 → calls go same-origin through the
  #    Firebase Hosting rewrite to hrm-api (no CORS, no exposed API host).
  - id: build-web
    name: node:20-slim
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        corepack enable && corepack prepare pnpm@9.1.0 --activate
        pnpm install --frozen-lockfile
        pnpm --filter @hrm/shared build
        VITE_API_URL=/api/v1 pnpm --filter @hrm/web build
    waitFor: ['-'] # start immediately, in parallel with the image build

  # 5) Deploy the SPA to Firebase Hosting (uses the build SA's ADC).
  - id: deploy-web
    name: node:20-slim
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        npx -y firebase-tools@13 deploy --only hosting --project $PROJECT_ID --non-interactive
    waitFor: ['build-web', 'deploy-api']

timeout: 1800s
